version: '3.8'

services:
  flat-file-scrubber:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ffis-app
    ports:
      - "8501:8501"
    environment:
      # General Streamlit settings
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_LOGGER_LEVEL: "info"
      
      # Application configuration
      # Uncomment and configure as needed:
      # SF_API_KEY: ${SF_API_KEY}
      # SF_API_URL: ${SF_API_URL}
      # SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT}
      # SNOWFLAKE_USER: ${SNOWFLAKE_USER}
      # SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD}
      # SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE}
      # SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA}
      # SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE}
    
    volumes:
      # Input data directory
      - ./data:/app/data
      # Secrets management (inject secrets.json here)
      - ./secrets.json:/app/secrets/secrets.json:ro
      # Optional: .env file for configuration
      - ./.env:/app/.env:ro
    
    # Restart policy for production
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

# Optional: Add additional services below (e.g., Snowflake proxy, reverse proxy, etc.)
